<nav class="flex justify-between items-center mb-6 pb-4 border-b border-gray-200 gap-3">
    <a href="/" class="font-bold text-gray-900 text-lg shrink-0">{{ t('site_title', lang) }}</a>
    <div class="flex gap-3 items-center text-sm flex-wrap justify-end">
        <form method="post" action="/set-lang" class="flex items-center gap-1">
            <select name="lang" onchange="this.form.submit()"
                    class="text-xs border border-gray-200 rounded px-1.5 py-1 bg-white text-gray-600 cursor-pointer focus:outline-none focus:border-blue-400">
                {% for code, name in LANGUAGES.items() %}
                <option value="{{ code }}" {% if code == lang %}selected{% endif %}>{{ name }}</option>
                {% endfor %}
            </select>
        </form>
        {% if user %}
            {% if user.is_pro %}
            <span class="px-2 py-0.5 bg-yellow-100 text-yellow-800 rounded-full text-xs font-semibold">{{ t('pro_badge', lang) }}</span>
            {% endif %}
            <span class="text-gray-600">{{ user.email }}</span>
            <a href="/history" class="text-gray-600 hover:text-gray-900">{{ t('nav_history', lang) }}</a>
            <a href="/account" class="text-gray-600 hover:text-gray-900">{{ t('nav_account', lang) }}</a>
            <form action="/logout" method="post" class="inline">
                <button type="submit" class="text-gray-500 hover:text-gray-700">{{ t('nav_logout', lang) }}</button>
            </form>
        {% else %}
            <a href="/login" class="text-gray-600 hover:text-gray-900">{{ t('nav_login', lang) }}</a>
            <a href="/signup" class="px-3 py-1 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium">{{ t('nav_signup', lang) }}</a>
        {% endif %}
    </div>
</nav>
